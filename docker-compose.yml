version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - rag_eval_data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=http://localhost:3000,http://localhost:3001
    restart: unless-stopped

volumes:
  rag_eval_data:
